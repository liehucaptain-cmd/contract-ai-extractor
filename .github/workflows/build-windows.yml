name: Build Windows Exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onedir --name 合同提取工具 --hidden-import fitz --hidden-import openpyxl --hidden-import PIL._tkinter_finder --hidden-import cv2 --hidden-import onnxruntime --collect-all gradio --collect-all gradio_client --collect-all starlette --collect-all jinja2 --collect-all PIL --collect-all openpyxl --collect-all surya --collect-all transformers --collect-all safetensors --collect-all tokenizers --collect-all onnxruntime --noconfirm app.py

      # PyTorch 需要特殊处理，如果上一步失败则用 spec 文件重试
      - name: Verify build
        shell: pwsh
        run: |
          if (Test-Path "dist/合同提取工具/合同提取工具.exe") { echo "Build OK" } else { echo "Build might have issues with torch" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 合同提取工具
          path: dist/合同提取工具/
