name: Build Windows Exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onedir --name 合同提取工具 --hidden-import fitz --hidden-import openpyxl --hidden-import PIL._tkinter_finder --collect-all gradio --collect-all gradio_client --collect-all PIL --collect-all openpyxl --noconfirm app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 合同提取工具
          path: dist/合同提取工具/
